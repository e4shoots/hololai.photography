<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 2rem; /* space between image and text */
    }

    .container img {
      max-width: 150px;
      height: auto;
    }

    .text {
      text-align: left;
    }

    h1 {
      font-size: 8rem;
      margin: 0;
      color: #ff3c3c;
    }

    p {
      font-size: 1.5rem;
      margin: 1rem 0 2rem;
    }

    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #ff3c3c;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    a:hover {
      background: #ff1a1a;
    }

    @media (max-width: 600px) {
      .container {
        flex-direction: column;
        gap: 1rem;
      }

      h1 {
        font-size: 5rem;
        text-align: center;
      }

      .text {
        text-align: center;
      }

      p {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/404.png" alt="404 Image">
    <div class="text">
      <h1>404</h1>
      <p>Oops! The page you’re looking for can’t be found.</p>
      <a href="/">Go Home</a>
    </div>
  </div>
</body>
</html>
